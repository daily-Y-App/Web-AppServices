    function updateUI() {
        const lang = document.getElementById('langSwitch').value;
        const data = webData[lang] || webData['my'];
        document.getElementById('mainTitle').innerText = data.mainTitle;
        const grid = document.getElementById('websiteGrid');
        grid.innerHTML = '';
        data.types.forEach(web => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${web.name}</h3><button class="detail-btn" onclick="showDetails(${web.id})">${data.btnLabel}</button>`;
            grid.appendChild(card);
        });
    }

    function showDetails(id) {
        const lang = document.getElementById('langSwitch').value;
        const currentData = webData[lang] || webData['my'];
        const selected = currentData.types.find(w => w.id === id);
        
        document.getElementById('detTitle').innerText = selected.name;
        document.getElementById('detPrice').innerText = currentData.priceLabel + selected.price;
        document.getElementById('detDesc').innerText = selected.desc;
        document.getElementById('buyBtnText').innerText = currentData.buyBtn;
        document.getElementById('backText').innerText = currentData.back;
        
        const photoGroup = document.getElementById('detPhotos');
        photoGroup.innerHTML = `
            <img src="${selected.img1}" onerror="this.style.display='none'">
            <img src="${selected.img2}" onerror="this.style.display='none'">
            <img src="${selected.img3}" onerror="this.style.display='none'">
        `;

        document.getElementById('main-page').style.display = 'none';
        document.getElementById('detail-page').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function goHome() {
        document.getElementById('main-page').style.display = 'block';
        document.getElementById('detail-page').style.display = 'none';
        window.scrollTo(0, 0);
    }

    updateUI();
</script>
